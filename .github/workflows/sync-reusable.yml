name: Sync Reusable

on:
  workflow_call:
    inputs:
      config-path:
        required: true
        type: string
      sync-type:
        required: true
        type: string
      repositories:
        required: true
        type: string

jobs:
  sync:
    name: Files (${{ inputs.sync-type }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Create Github APP token
        uses: webitel/reusable-workflows/actions/create-github-app-token@create-github-app-token-v1
        id: app-token
        with:
          app-id: ${{ vars.DELIVERY_BOT_APP_ID }}
          private-key: ${{ secrets.DELIVERY_BOT_APP_PEM }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ inputs.repositories }}

      - name: Sync files across repositories
        uses: webitel/reusable-workflows/actions/file-sync@file-sync-v2
        with:
          GH_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          GIT_USERNAME: ${{ steps.app-token.outputs.user-name }}
          GIT_EMAIL: ${{ steps.app-token.outputs.user-email }}
          CONFIG_PATH: ${{ inputs.config-path }}
          PR_LABELS: sync,${{ inputs.sync-type }}
          ASSIGNEES: kirychukyurii
          COMMIT_EACH_FILE: false
          COMMIT_PREFIX: ""
          ORIGINAL_MESSAGE: true
          COMMIT_AS_PR_TITLE: true
          OVERWRITE_EXISTING_PR: true
          DRY_RUN: false
          BRANCH_PREFIX: repo-sync/${{ inputs.sync-type }}
          NUNJUCKS_VARIABLE_START: "((("
          NUNJUCKS_VARIABLE_END: ")))"
