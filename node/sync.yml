definitions:
  template/workflow: &template/workflow
    version: v2

  template/client: &template/client
    <<: *template/workflow
    name: webitel-admin-app
    build:
      app-root: /opt/www/admin

  template/web-meeting: &template/web-meeting
    <<: *template/workflow
    name: webitel-meetings-app
    build:
      app-root: /opt/www/meetings

  template/crm: &template/crm
    <<: *template/workflow
    name: webitel-crm-app
    build:
      app-root: /opt/www/crm
      package-conflicts: webitel-crm
      package-replaces: webitel-crm
      package-provides: webitel-crm

  template/cc-history: &template/cc-history
    <<: *template/workflow
    name: webitel-history-app
    build:
      app-root: /opt/www/history
      package-conflicts: webitel-history
      package-replaces: webitel-history
      package-provides: webitel-history

  template/web-client-auth: &template/web-client-auth
    <<: *template/workflow
    name: webitel-auth-app
    build:
      app-root: /opt/www/auth

  template/cc-supervisor: &template/cc-supervisor
    <<: *template/workflow
    name: webitel-supervisor-workspace-app
    build:
      app-root: /opt/www/supervisor
      package-conflicts: webitel-supervisor-workspace
      package-replaces: webitel-supervisor-workspace
      package-provides: webitel-supervisor-workspace

  template/cc-quality-auditor: &template/cc-quality-auditor
    <<: *template/workflow
    name: webitel-audit-app
    build:
      app-root: /opt/www/audit

  template/omnichannel-widget: &template/omnichannel-widget
    <<: *template/workflow
    name: webitel-web-widget-app
    build:
      app-root: /opt/www/omni-widget
      package-conflicts: webitel-web-widget
      package-replaces: webitel-web-widget
      package-provides: webitel-web-widget

  template/wfm-app: &template/wfm-app
    <<: *template/workflow
    name: webitel-wfm-app
    build:
      app-root: /opt/www/wfm

  template/webitel-flow-diagram: &template/webitel-flow-diagram
    <<: *template/workflow
    name: webitel-flow-diagram-app
    build:
      app-root: /opt/www/flow-diagram
      package-conflicts: webitel-flow-diagram
      package-replaces: webitel-flow-diagram
      package-provides: webitel-flow-diagram

  template/cc-workspaces: &template/cc-workspaces
    <<: *template/workflow
    name: webitel-agent-workspace-app
    build:
      app-root: /opt/www/workspaces
      package-conflicts: webitel-agent-workspace
      package-replaces: webitel-agent-workspace
      package-provides: webitel-agent-workspace

webitel/client:
  - source: node/workflows/workflow.yml.njk
    dest: .github/workflows/workflow.yml
    template: *template/client

  - source: node/workflows/pull-request.yml.njk
    dest: .github/workflows/pull-request.yml
    template: *template/client

  - source: common/workflows/pull-request-deliver.yml.njk
    dest: .github/workflows/pull-request-deliver.yml
    template: *template/client

