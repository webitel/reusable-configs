definitions:
  template/workflow: &template/workflow
    version: v2

group:
  - repos: |
      webitel/client
      webitel/web-meeting
      webitel/crm
      webitel/cc-history
      webitel/web-client-auth
      webitel/cc-supervisor
      webitel/cc-quality-auditor
      webitel/omnichannel-widget
      webitel/wfm-app
      webitel/webitel-flow-diagram
      webitel/cc-workspaces

    files:
      - source: node/configs/dependabot.yml
        dest: .github/dependabot.yml

      - source: node/workflows/libs.update.yml
        dest: .github/workflows/libs.update.yml

      - source: node/workflows/make-release.yml
        dest: .github/workflows/make-release.yml

      - source: common/workflows/backport-trigger.yml.njk
        dest: .github/workflows/backport-trigger.yml
        template:
          <<: *template/workflow

      - source: common/workflows/backport.yml.njk
        dest: .github/workflows/backport.yml
        template:
          <<: *template/workflow

# TODO: add later
#      - source: common/workflows/dependabot-auto-merge.yml
#        dest: .github/workflows/dependabot-auto-merge.yml
