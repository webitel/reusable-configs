definitions:
  template/workflow: &template/workflow
    version: v2

  # Generic Debian maintainer scripts, synced verbatim from
  # golang/deploy/debian/ via sync-static.yml. preinst is intentionally
  # absent (the scripts manage every shipped unit at runtime).
  deb/scripts: &deb/scripts |
    postinstall: deploy/debian/postinst.sh
    preremove: deploy/debian/prerm.sh
    postremove: deploy/debian/postrm.sh

  template/call_audit: &template/call_audit
    <<: *template/workflow
    name: webitel-call-audit
    branch: main
    build:
      binary-name: webitel-call-audit
      ldflags: |
        -s -w

  template/call_center: &template/call_center
    <<: *template/workflow
    name: webitel-call-center
    branch: main
    build:
      binary-name: webitel-call-center
      ldflags: |
        -s -w
        -X github.com/webitel/call_center/model.BuildNumber=${{ github.run_number }}

      package-contents: |
        src=deploy/systemd/webitel-call-center.service dst=/etc/systemd/system/webitel-call-center.service type=config
        src=.env.example dst=/etc/default/webitel-call-center type=config mode=0640

      scripts: *deb/scripts

  template/cases: &template/cases
    <<: *template/workflow
    name: webitel-cases
    branch: main
    build:
      binary-name: webitel-cases
      ldflags: |
        -s -w

      package-contents: |
        src=deploy/systemd/webitel-cases.service dst=/etc/systemd/system/webitel-cases.service type=config
        src=.env.example dst=/etc/default/webitel-cases type=config mode=0640

      scripts: *deb/scripts

  template/chat_manager: &template/chat_manager
    <<: *template/workflow
    name: webitel-messages
    branch: main
    build:
      binary-name: webitel-messages
      ldflags: |
        -s -w
        -X github.com/webitel/chat_manager/cmd.GitTag=${{ github.ref_name }}
        -X github.com/webitel/chat_manager/cmd.GitCommit=${{ github.sha }}
        -X github.com/webitel/chat_manager/cmd.BuildDate=${{ github.event.head_commit.timestamp }}

      package-contents: |
        src=deploy/systemd/webitel-messages-bot.service dst=/etc/systemd/system/webitel-messages-bot.service type=config
        src=deploy/systemd/webitel-messages-srv.service dst=/etc/systemd/system/webitel-messages-srv.service type=config
        src=bot/telegram/gotd/public/ dst=/usr/share/webitel/webitel-messages-bot/public-html
        src=.env.bot.example dst=/etc/default/webitel-messages-bot type=config mode=0640
        src=.env.app.example dst=/etc/default/webitel-messages-srv type=config mode=0640

      scripts: *deb/scripts

  template/engine: &template/engine
    <<: *template/workflow
    name: webitel-engine
    branch: main
    build:
      binary-name: webitel-engine
      ldflags: |
        -s -w
        -X github.com/webitel/engine/model.BuildNumber=${{ github.run_number }}

      package-contents: |
        src=deploy/systemd/webitel-engine.service dst=/etc/systemd/system/webitel-engine.service type=config
        src=deploy/debian/postinst.d/ dst=/usr/lib/webitel/webitel-engine/deb/postinst.d/
        src=.env.example dst=/etc/default/webitel-engine type=config mode=0640
        
      scripts: *deb/scripts

  template/flow_manager: &template/flow_manager
    <<: *template/workflow
    name: webitel-flow-manager
    branch: main
    build:
      binary-name: webitel-flow-manager
      ldflags: |
        -s -w
        -X github.com/webitel/flow_manager/model.BuildNumber=${{ github.run_number }}

      package-contents: |
        src=deploy/systemd/webitel-flow-manager.service dst=/etc/systemd/system/webitel-flow-manager.service type=config
        src=message_templates/ dst=/usr/share/webitel/webitel-flow-manager/message-templates
        src=.env.example dst=/etc/default/webitel-flow-manager type=config mode=0640

      scripts: *deb/scripts

  template/im-account-service: &template/im-account-service
    <<: *template/workflow
    name: webitel-im-account
    branch: main
    build:
      binary-name: webitel-im-account
      ldflags: |
        -s -w
        -X github.com/webitel/im-account-service/internal/domain/model.Commit=${{ github.sha }}
        -X github.com/webitel/im-account-service/internal/domain/model.CommitDate=${{ github.event.head_commit.timestamp }}
        -X github.com/webitel/im-account-service/internal/domain/model.Branch=${{ github.ref_name }}

      package-contents: |
        src=deploy/systemd/webitel-im-account.service dst=/etc/systemd/system/webitel-im-account.service type=config

      scripts: *deb/scripts

  template/im-contact-service: &template/im-contact-service
    <<: *template/workflow
    name: webitel-im-contact
    branch: main
    build:
      binary-name: webitel-im-contact
      ldflags: |
        -s -w
        -X github.com/webitel/im-contact-service/internal/domain/model.Commit=${{ github.sha }}
        -X github.com/webitel/im-contact-service/internal/domain/model.CommitDate=${{ github.event.head_commit.timestamp }}
        -X github.com/webitel/im-contact-service/internal/domain/model.Branch=${{ github.ref_name }}

      package-contents: |
        src=deploy/systemd/webitel-im-contact.service dst=/etc/systemd/system/webitel-im-contact.service type=config

      scripts: *deb/scripts

  template/im-delivery-service: &template/im-delivery-service
    <<: *template/workflow
    name: webitel-im-delivery
    branch: main
    build:
      binary-name: webitel-im-delivery
      ldflags: |
        -s -w
        -X github.com/webitel/im-delivery-service/internal/domain/model.Commit=${{ github.sha }}
        -X github.com/webitel/im-delivery-service/internal/domain/model.CommitDate=${{ github.event.head_commit.timestamp }}
        -X github.com/webitel/im-delivery-service/internal/domain/model.Branch=${{ github.ref_name }}

      package-contents: |
        src=deploy/systemd/webitel-im-delivery.service dst=/etc/systemd/system/webitel-im-delivery.service type=config

      scripts: *deb/scripts

  template/im-gateway-service: &template/im-gateway-service
    <<: *template/workflow
    name: webitel-im-gateway
    branch: main
    build:
      binary-name: webitel-im-gateway
      ldflags: |
        -s -w
        -X github.com/webitel/im-gateway-service/internal/domain/model.Commit=${{ github.sha }}
        -X github.com/webitel/im-gateway-service/internal/domain/model.CommitDate=${{ github.event.head_commit.timestamp }}
        -X github.com/webitel/im-gateway-service/internal/domain/model.Branch=${{ github.ref_name }}

      package-contents: |
        src=deploy/systemd/webitel-im-gateway.service dst=/etc/systemd/system/webitel-im-gateway.service type=config

      scripts: *deb/scripts

  template/im-providers-service: &template/im-providers-service
    <<: *template/workflow
    name: webitel-im-providers
    branch: main
    build:
      binary-name: webitel-im-providers
      ldflags: |
