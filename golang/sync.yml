      package-contents: |
        src=deploy/systemd/webitel-media-exporter.service dst=/etc/systemd/system/webitel-media-exporter.service type=config
        src=.env.example dst=/etc/default/webitel-media-exporter type=config mode=0640

      scripts: *deb/scripts

  template/storage: &template/storage
    <<: *template/workflow
    name: webitel-storage
    branch: main
    build:
      binary-name: webitel-storage
      ldflags: |
        -s -w
        -X github.com/webitel/storage/model.BuildNumber=${{ github.run_number }}

      package-depends: ffmpeg
      package-contents: |
        src=deploy/systemd/webitel-storage.service dst=/etc/systemd/system/webitel-storage.service type=config
        src=deploy/debian/postinst.d/ dst=/usr/lib/webitel/webitel-storage/deb/postinst.d/
        src=.env.example dst=/etc/default/webitel-storage type=config mode=0640

      scripts: *deb/scripts

  template/webitel-fts: &template/webitel-fts
    <<: *template/workflow
    name: webitel-fts
    branch: main
    build:
      binary-name: webitel-fts
      ldflags: |
        -s -w
        -X github.com/webitel/webitel-fts/cmd.Build=${{ github.run_number }}

      package-contents: |
        src=deploy/systemd/webitel-fts.service dst=/etc/systemd/system/webitel-fts.service type=config
        src=mapping/ dst=/usr/share/webitel/webitel-fts/mapping
        src=.env.example dst=/etc/default/webitel-fts type=config mode=0640

