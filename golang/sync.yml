        -X github.com/webitel/im-providers-service/internal/domain/model.Commit=${{ github.sha }}
        -X github.com/webitel/im-providers-service/internal/domain/model.CommitDate=${{ github.event.head_commit.timestamp }}
        -X github.com/webitel/im-providers-service/internal/domain/model.Branch=${{ github.ref_name }}

      package-contents: |
        src=deploy/systemd/webitel-im-providers.service dst=/etc/systemd/system/webitel-im-providers.service type=config

      scripts: *deb/scripts

  template/im-thread-service: &template/im-thread-service
    <<: *template/workflow
    name: webitel-im-thread
    branch: main
    build:
      binary-name: webitel-im-thread
      ldflags: |
        -s -w
        -X github.com/webitel/im-thread-service/internal/domain/model.Commit=${{ github.sha }}
        -X github.com/webitel/im-thread-service/internal/domain/model.CommitDate=${{ github.event.head_commit.timestamp }}
        -X github.com/webitel/im-thread-service/internal/domain/model.Branch=${{ github.ref_name }}

      package-contents: |
        src=deploy/systemd/webitel-im-thread.service dst=/etc/systemd/system/webitel-im-thread.service type=config

      scripts: *deb/scripts

  template/logger: &template/logger
    <<: *template/workflow
    name: webitel-logger
    branch: main
    build:
      binary-name: webitel-logger
      ldflags: |
        -s -w

      package-contents: |
        src=deploy/systemd/webitel-logger.service dst=/etc/systemd/system/webitel-logger.service type=config
        src=.env.example dst=/etc/default/webitel-logger type=config mode=0640

      scripts: *deb/scripts

  template/media-exporter: &template/media-exporter
    <<: *template/workflow
    name: webitel-media-exporter
    branch: main
    build:
      binary-name: webitel-media-exporter
